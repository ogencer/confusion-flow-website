<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="ga" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7C948;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#F7C948;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8453C;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#E8453C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C5A;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FF8C5A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background with rounded corners for app icon -->
  <rect width="256" height="256" rx="40" fill="#110F1A"/>

  <!-- Five chaotic lines converging - remapped from original viewBox to 256x256 square -->
  <!-- Original: x 48-220, y 78-230 mapped to padded square with convergence at right-center -->
  <g transform="translate(16, 18) scale(1.3)">
    <path d="M10,38 C30,78 44,25 66,70 C84,115 98,50 120,78 C138,100 150,98 164,100"
          fill="none" stroke="url(#ga)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M8,65 C32,38 44,105 70,68 C90,40 102,112 124,90 C140,75 152,98 164,100"
          fill="none" stroke="url(#gb)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M12,100 C32,68 46,128 70,92 C90,62 105,125 126,102 C142,88 155,100 164,100"
          fill="none" stroke="url(#gc)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M8,135 C32,108 46,160 70,125 C90,95 105,145 126,118 C144,98 155,100 164,100"
          fill="none" stroke="url(#gd)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M12,168 C34,135 48,180 72,148 C92,120 108,160 128,130 C145,108 155,102 164,100"
          fill="none" stroke="url(#ge)" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Convergence point -->
    <circle cx="164" cy="100" r="10" fill="#FF6B35" filter="url(#glow)"/>
    <circle cx="164" cy="100" r="20" fill="#FF6B35" opacity="0.08"/>
  </g>
</svg>
